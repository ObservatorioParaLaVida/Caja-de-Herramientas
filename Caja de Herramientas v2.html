<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caja de Herramientas — Protejid@s · ODEVIDA</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&family=Nunito+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <meta name="ext-resource-dependency" content="uploads/logo de protegidos .png" data-resource-id="logoProtegidos"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink: #C4347A; --pink-d: #A02860; --pink-l: #E8407C; --pink-pale: #F9E8F0;
      --orange: #F2A227; --orange-d: #D98B12;
      --blue: #2B4F8F; --blue-d: #1C3566;
      --red: #D94B3A; --green: #5A9E47;
      --cream: #FAF6EE; --dark: #1C2340;
    }
    html, body { height: 100%; font-family: 'Nunito Sans', sans-serif; background: var(--cream); color: var(--dark); overflow-x: hidden; }
    #root { min-height: 100%; }

    /* ── NAV ── */
    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 300; background: #111; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; gap: 12px; }
    .nav-logo { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 16px; color: #fff; white-space: nowrap; cursor: pointer; display:flex; align-items:center; }
    .nav-logo img { filter: brightness(0) invert(1); }
    .nav-logo:hover { color: var(--orange); }
    .nav-logo:hover img { filter: brightness(0) invert(1) sepia(1) saturate(8) hue-rotate(-18deg); }
    .nav-steps { display: flex; gap: 3px; flex-wrap: nowrap; overflow-x: auto; }
    .nav-step { padding: 4px 11px; border-radius: 20px; font-size: 11px; font-weight: 700; font-family: 'Nunito', sans-serif; border: none; transition: all .2s; cursor: default; color: rgba(255,255,255,.3); background: transparent; white-space: nowrap; }
    .nav-step.done { background: rgba(255,255,255,.12); color: rgba(255,255,255,.7); cursor: pointer; }
    .nav-step.active-y { background: var(--orange); color: #fff; }
    .nav-step.active-p { background: var(--pink); color: #fff; }
    .nav-back { color: rgba(255,255,255,.6); text-decoration: none; font-size: 12px; font-weight: 700; font-family: 'Nunito', sans-serif; display: flex; align-items: center; gap: 5px; white-space: nowrap; transition: color .2s; background: none; border: none; cursor: pointer; padding: 0; }
    .nav-back:hover { color: var(--orange); }

    /* ── SCREENS ── */
    .screen { min-height: 100vh; padding-top: 56px; }
    .fade-in { animation: fadeUp .35s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    /* ── SHARED BUTTONS ── */
    .btn-primary { background: var(--orange); color: #fff; border: none; padding: 13px 34px; border-radius: 50px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px; cursor: pointer; transition: all .2s; box-shadow: 0 4px 18px rgba(242,162,39,.35); display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary:hover { background: var(--orange-d); transform: translateY(-2px); }
    .btn-outline { background: transparent; color: var(--blue); border: 2px solid var(--blue); padding: 11px 26px; border-radius: 50px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; transition: all .2s; }
    .btn-outline:hover { background: var(--blue); color: #fff; }
    .btn-pink { background: var(--pink); color: #fff; border: none; padding: 13px 34px; border-radius: 50px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px; cursor: pointer; transition: all .2s; box-shadow: 0 4px 18px rgba(196,52,122,.35); display: inline-flex; align-items: center; gap: 8px; }
    .btn-pink:hover { background: var(--pink-d); transform: translateY(-2px); }
    .btn-outline-pink { background: transparent; color: var(--pink); border: 2px solid var(--pink); padding: 11px 26px; border-radius: 50px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-outline-pink:hover { background: var(--pink); color: #fff; }
    .btn-dark { background: var(--dark); color: #fff; border: none; padding: 11px 22px; border-radius: 50px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-dark:hover { background: #2c3557; }

    /* ── HOME ── */
    .home-screen { min-height: 100vh; background: linear-gradient(160deg,#dce8f5 0%,#eef5e0 40%,#f5edda 80%,#f2e6c8 100%); display: flex; align-items: center; justify-content: center; padding: 60px 24px 48px; gap: 64px; flex-wrap: wrap; }
    .home-left { max-width: 420px; }
    .home-body { font-size: 15px; line-height: 1.7; color: #4a4a5a; margin-bottom: 32px; }
    .home-bolsillos { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }
    .bolsillo-chip { display: flex; align-items: center; gap: 8px; padding: 9px 18px; border-radius: 50px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px; border: none; cursor: pointer; transition: all .2s; text-decoration: none; }
    .bolsillo-chip:hover { transform: translateY(-2px); }
    .home-hint { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--blue); animation: blink 2.2s ease infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.45} }
    .bag-wrap { position: relative; width: 300px; flex-shrink: 0; }
    .pulse-ring { animation: ringPulse 2s ease infinite; transform-origin: center; }
    @keyframes ringPulse { 0%,100%{opacity:.7;transform:scale(1)} 50%{opacity:0;transform:scale(1.4)} }

    /* ── AMARILLO: ESTRATEGIAS (NEW WF1) ── */
    .estrategias-screen { background: var(--cream); min-height: 100vh; padding: 80px 28px 60px; display: flex; flex-direction: column; align-items: center; }
    .estrategias-eyebrow { background: var(--orange); color: #fff; padding: 5px 18px; border-radius: 20px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
    .estrategias-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: clamp(20px,2.6vw,28px); color: var(--dark); text-align: center; line-height: 1.25; max-width: 880px; margin-bottom: 18px; }
    .estrategias-title span { color: var(--orange); }
    .estrategias-objetivo { background: #fff; border-left: 5px solid var(--orange); border-radius: 12px; padding: 20px 26px; max-width: 880px; margin-bottom: 36px; box-shadow: 0 2px 14px rgba(0,0,0,.04); }
    .estrategias-objetivo-label { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 12px; color: var(--orange); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .estrategias-objetivo-text { font-size: 14px; line-height: 1.7; color: #444; }
    .estrategias-section-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: clamp(20px,2.4vw,30px); color: var(--blue); margin: 8px 0 32px; text-align: center; }
    .estrategias-cluster { position: relative; width: 100%; max-width: 880px; height: 380px; margin: 0 auto 24px; }
    .estrategia-circle-wrap { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; width: 180px; transform: translate(-50%, -50%); }
    .estrategia-circle { width: 84px; height: 84px; border-radius: 50%; background: var(--orange); display: flex; align-items: center; justify-content: center; transition: transform .25s, box-shadow .25s; box-shadow: 0 6px 18px rgba(242,162,39,.32); position: relative; color: #fff; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 32px; }
    .estrategia-circle.seen { background: var(--blue); box-shadow: 0 8px 22px rgba(43,79,143,.32); }
    .estrategia-circle-wrap:hover .estrategia-circle { transform: scale(1.08); box-shadow: 0 14px 32px rgba(242,162,39,.45); }
    .estrategia-check { position: absolute; top: 6px; right: 6px; width: 24px; height: 24px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--blue); }
    .estrategia-label { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 12.5px; color: var(--dark); text-align: center; line-height: 1.3; max-width: 168px; }
    @media (max-width: 860px) {
      .estrategias-cluster { height: auto; display: grid; grid-template-columns: repeat(2,1fr); gap: 24px; place-items: center; }
      .estrategia-circle-wrap { position: static !important; transform: none !important; }
    }

    /* ── AMARILLO: CASOS (NEW WF2) ── */
    .casos-screen { background: var(--cream); min-height: 100vh; padding: 80px 28px 60px; }
    .casos-header { text-align: center; max-width: 900px; margin: 0 auto 36px; }
    .casos-eyebrow { background: var(--orange); color: #fff; padding: 5px 18px; border-radius: 20px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; display: inline-block; margin-bottom: 12px; }
    .casos-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: clamp(24px,3vw,38px); color: var(--dark); line-height: 1.15; }
    .casos-title span { color: var(--orange); }
    .casos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 1100px; margin: 0 auto 28px; }
    @media (max-width: 860px) { .casos-grid { grid-template-columns: 1fr; } }
    .caso-card { background: #fff; border-radius: 16px; padding: 0; box-shadow: 0 4px 20px rgba(0,0,0,.07); overflow: hidden; display: flex; flex-direction: column; }
    .caso-card-head { background: var(--blue); padding: 18px 24px; color: #fff; display: flex; align-items: center; gap: 14px; }
    .caso-card-head-num { width: 38px; height: 38px; border-radius: 50%; background: var(--orange); display: flex; align-items: center; justify-content: center; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 16px; flex-shrink: 0; }
    .caso-card-name { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 17px; line-height: 1.2; }
    .caso-card-sub { font-size: 11px; color: rgba(255,255,255,.7); margin-top: 3px; line-height: 1.3; }
    .caso-card-body { padding: 20px 24px; }
    .caso-narrative { font-size: 14px; line-height: 1.75; color: #3a3a4a; }
    .caso-highlight { background: linear-gradient(transparent 60%, rgba(242,162,39,.32) 60%); padding: 0 2px; font-weight: 600; }
    .caso-riesgos { margin-top: 22px; background: rgba(217,75,58,.06); border-left: 4px solid var(--red); border-radius: 0 10px 10px 0; padding: 14px 18px; }
    .caso-riesgos-label { display: flex; align-items: center; gap: 8px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 12px; color: var(--red); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
    .caso-riesgos-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
    .caso-riesgos-list li { font-size: 13px; line-height: 1.55; color: #4a4a5a; padding-left: 22px; position: relative; }
    .caso-riesgos-list li::before { content: '!'; position: absolute; left: 0; top: 1px; width: 16px; height: 16px; border-radius: 50%; background: var(--red); color: #fff; display: flex; align-items: center; justify-content: center; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 10px; }
    .casos-actions { display: flex; justify-content: center; max-width: 1100px; margin: 0 auto; }

    /* ── AMARILLO: CONCEPTS ── */
    .concepts-screen { background: var(--cream); padding: 80px 32px 60px; display: flex; flex-direction: column; align-items: center; }
    .section-eyebrow { background: var(--blue); color: #fff; padding: 4px 16px; border-radius: 20px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 16px; }
    .concepts-heading { text-align: center; margin-bottom: 8px; }
    .concepts-heading h2 { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: clamp(32px,5vw,52px); line-height: 1; color: var(--orange); }
    .concepts-heading h3 { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: clamp(32px,5vw,52px); line-height: 1; color: var(--dark); }
    .concepts-sub { font-size: 15px; color: #5a5a6a; max-width: 520px; text-align: center; line-height: 1.65; margin: 12px 0 40px; }
    .concepts-grid { display: grid; grid-template-columns: repeat(3,140px); gap: 32px 20px; margin-bottom: 48px; }
    .concept-item { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; }
    .concept-circle { width: 116px; height: 116px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: transform .2s, box-shadow .2s; box-shadow: 0 6px 20px rgba(0,0,0,.13); position: relative; }
    .concept-circle:hover { transform: scale(1.09); box-shadow: 0 12px 30px rgba(0,0,0,.2); }
    .concept-check { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .concept-label { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 12px; color: var(--dark); text-align: center; max-width: 120px; line-height: 1.3; }
    .progress-bar { width: 100%; max-width: 480px; height: 5px; background: #e8e0d0; border-radius: 3px; margin-bottom: 8px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--orange); border-radius: 3px; transition: width .4s ease; }
    .progress-label { font-size: 13px; color: #888; margin-bottom: 24px; text-align: center; }

    /* ── AMARILLO: FICHAS ── */
    .fichas-screen { background: #e8e5de; min-height: 100vh; display: flex; flex-direction: column; }
    .fichas-topbar { background: var(--blue); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; flex-shrink: 0; }
    .fichas-topbar h2 { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 17px; color: #fff; }
    .fichas-tip { margin: 10px 20px 0; padding: 10px 16px; background: #fff; border-left: 4px solid var(--orange); border-radius: 0 8px 8px 0; font-size: 12px; color: #555; line-height: 1.5; flex-shrink: 0; }
    .fichas-panel { padding: 10px 20px 0; flex-shrink: 0; }
    .fichas-panel-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; font-family: 'Nunito', sans-serif; }
    .fichas-grid { display: grid; grid-template-columns: repeat(10,1fr); gap: 6px; }
    .fichas-workspace-label { margin: 12px 20px 0; font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: .8px; font-family: 'Nunito', sans-serif; }
    .fichas-canvas { position: relative; flex: 1; min-height: 340px; margin: 8px 20px 20px; border: 2px dashed #ccc; border-radius: 12px; background: rgba(255,255,255,.25); user-select: none; overflow: hidden; }
    .workspace-empty { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 13px; color: #ccc; font-style: italic; pointer-events: none; text-align: center; line-height: 1.6; }
    .ficha-mini { border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.12); cursor: grab; display: flex; overflow: hidden; transition: box-shadow .15s, transform .15s; width: 100%; height: 68px; }
    .ficha-mini:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,.18); }
    .ficha-mini.used { opacity: .35; pointer-events: none; }
    .ficha { position: absolute; width: 320px; height: 110px; border-radius: 12px; box-shadow: 0 4px 14px rgba(0,0,0,.15); cursor: grab; display: flex; overflow: hidden; transition: box-shadow .15s; }
    .ficha.dragging { box-shadow: 0 14px 36px rgba(0,0,0,.25); cursor: grabbing; z-index: 9999; }
    .ficha-left { width: 56px; flex-shrink: 0; background: var(--blue); display: flex; align-items: center; justify-content: center; }
    .ficha-right { flex: 1; padding: 14px 18px; display: flex; align-items: center; }
    .ficha-text { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 14px; color: #fff; line-height: 1.3; }
    .ficha-subtitle { font-family: 'Nunito Sans', sans-serif; font-size: 12px; color: rgba(255,255,255,.85); margin-top: 4px; line-height: 1.3; font-style: italic; }
    .ficha-mini .ficha-left { width: 40px; }
    .ficha-mini .ficha-right { padding: 8px 10px; }
    .ficha-mini .ficha-text { font-size: 9px; }
    .drag-hint { position: absolute; bottom: 12px; right: 16px; font-size: 11px; color: #bbb; font-style: italic; pointer-events: none; }

    /* ── AMARILLO: MATRIX ── */
    .matrix-screen { background: var(--cream); padding: 72px 28px 60px; }
    .matrix-banner { background: var(--dark); color: #fff; border-radius: 14px; padding: 22px 28px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; }
    .matrix-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 18px; color: var(--orange); line-height: 1.2; }
    .matrix-subtitle { font-size: 12px; color: rgba(255,255,255,.6); margin-top: 4px; }
    .matrix-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .matrix-wrap { overflow-x: auto; }
    .matrix-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,.07); }
    .matrix-table th { background: var(--orange); color: #fff; padding: 14px 18px; text-align: center; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: .8px; border-right: 2px solid rgba(255,255,255,.3); }
    .matrix-table th:last-child { border-right: none; }
    .matrix-table td { padding: 0; border: 1.5px solid var(--orange); vertical-align: top; }
    .cell-input { width: 100%; border: none; background: transparent; font-family: 'Nunito Sans', sans-serif; font-size: 13px; color: var(--dark); resize: none; outline: none; line-height: 1.6; min-height: 90px; padding: 10px 12px; }
    .cell-input:focus { background: #fff8ee; }
    .add-row { margin-top: 14px; width: 100%; padding: 13px; background: none; border: 2px dashed #cec9be; border-radius: 10px; color: #aaa; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; transition: all .2s; }
    .add-row:hover { border-color: var(--orange); color: var(--orange); }
    .reflection-box { margin-top: 28px; background: #fff; border-radius: 14px; border-left: 5px solid var(--orange); padding: 22px 26px; }
    .reflection-box h4 { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px; color: var(--dark); margin-bottom: 12px; }

    /* ── SHARED OVERLAY ── */
    .overlay-bg { position: fixed; inset: 0; background: rgba(28,35,64,.75); display: flex; align-items: center; justify-content: center; z-index: 500; backdrop-filter: blur(6px); padding: 24px; }
    .overlay-card { background: #fff; border-radius: 24px; padding: 40px; max-width: 540px; width: 100%; position: relative; box-shadow: 0 24px 64px rgba(0,0,0,.28); animation: popIn .25s cubic-bezier(.34,1.56,.64,1); }
    @keyframes popIn { from { transform: scale(.82); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .overlay-close { position: absolute; top: 16px; right: 16px; width: 34px; height: 34px; border-radius: 50%; border: none; background: #f0eee8; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; color: #666; }
    .overlay-close:hover { background: #e5e0d8; }
    .overlay-icon { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
    .overlay-tag { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 11px; font-weight: 800; font-family: 'Nunito', sans-serif; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px; }
    .overlay-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 20px; color: var(--dark); margin-bottom: 12px; line-height: 1.2; }
    .overlay-def { font-size: 14px; line-height: 1.75; color: #444; }
    .overlay-actions { margin-top: 24px; display: flex; justify-content: flex-end; gap: 10px; }

    /* ── ROSADO: WF5 ── */
    .wf5-screen { background: var(--cream); min-height: 100vh; padding: 80px 32px 60px; display: flex; flex-direction: column; align-items: center; }
    .wf5-main-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: clamp(28px,4vw,46px); color: var(--dark); line-height: 1.1; text-align: center; margin-bottom: 18px; }
    .wf5-main-title span { color: var(--pink); }

function FichasScreenA({ onNext }) {
  const canvasRef = useRef(null);
  const dragging = useRef(null);
  const posRef = useRef({});
  const maxZRef = useRef(FICHAS_DATA.length);
  const [activeDrag, setActiveDrag] = useState(null);
  const [inWorkspace, setInWorkspace] = useState(new Set());
  const [positions, setPositions] = useState({});
  posRef.current = positions;

  const dragFromGrid = useCallback((e, id) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const newZ = ++maxZRef.current;
    const x = e.clientX - rect.left - 115;
    const y = e.clientY - rect.top - 40;
    setPositions((prev) => ({ ...prev, [id]: { x: Math.max(0, x), y: Math.max(0, y), z: newZ } }));
    setInWorkspace((prev) => new Set([...prev, id]));
    dragging.current = { id, ox: 115, oy: 40 };
    setActiveDrag(id);
    e.preventDefault();
  }, []);

  const mouseDownPos = useRef(null);
  const returnToGrid = useCallback((id) => {
    setInWorkspace((prev) => {const n = new Set(prev);n.delete(id);return n;});
    setPositions((prev) => {const n = { ...prev };delete n[id];return n;});
  }, []);

  const onMouseDown = useCallback((e, id) => {
    const pos = posRef.current[id];
    if (!pos) return;
    const rect = canvasRef.current.getBoundingClientRect();
    const newZ = ++maxZRef.current;
    setPositions((prev) => ({ ...prev, [id]: { ...prev[id], z: newZ } }));
    dragging.current = { id, ox: e.clientX - rect.left - pos.x, oy: e.clientY - rect.top - pos.y };
    mouseDownPos.current = { x: e.clientX, y: e.clientY };
    setActiveDrag(id);
    e.preventDefault();
  }, []);

  const onMouseMove = useCallback((e) => {
    if (!dragging.current) return;
    const { id, ox, oy } = dragging.current;
    const rect = canvasRef.current.getBoundingClientRect();
    setPositions((prev) => ({ ...prev, [id]: { ...prev[id], x: Math.max(0, e.clientX - rect.left - ox), y: Math.max(0, e.clientY - rect.top - oy) } }));
  }, []);

  const onMouseUp = useCallback((e) => {
    if (dragging.current && mouseDownPos.current) {
      const dx = Math.abs(e.clientX - mouseDownPos.current.x);
      const dy = Math.abs(e.clientY - mouseDownPos.current.y);
      if (dx < 5 && dy < 5) returnToGrid(dragging.current.id);
    }
    dragging.current = null;mouseDownPos.current = null;setActiveDrag(null);
  }, [returnToGrid]);

  useEffect(() => {
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    return () => {window.removeEventListener('mousemove', onMouseMove);window.removeEventListener('mouseup', onMouseUp);};
  }, []);

  const resetAll = () => {setInWorkspace(new Set());setPositions({});};

  return (
    <div className="screen fichas-screen fade-in">
      <div className="fichas-topbar">
        <h2>Fichas Interactivas — Ruta de Respuesta de Emergencia</h2>
        <div style={{ display: 'flex', gap: 10 }}>
          <button className="btn-primary" style={{ fontSize: 13, padding: '8px 20px' }} onClick={resetAll}>Restablecer</button>
          <button className="btn-primary" style={{ fontSize: 13, padding: '8px 20px' }} onClick={onNext}>Continuar <Ico name="arrow" size={14} /></button>
        </div>
      </div>
      <div className="fichas-tip"><strong>Instrucciones:</strong> Arrastra las fichas desde el panel superior al espacio de trabajo para construir y ordenar tu ruta de respuesta.</div>
      <div className="fichas-panel">
        <div className="fichas-panel-label">Fichas disponibles — arrastra al espacio de trabajo</div>
        <div className="fichas-grid">
          {FICHAS_DATA.map((f, i) => {
            const used = inWorkspace.has(f.id);
            return (
              <div key={f.id} className={`ficha-mini${used ? ' used' : ''}`}
              onMouseDown={used ? undefined : (e) => dragFromGrid(e, f.id)}
              style={{ cursor: used ? 'default' : 'grab' }}>
                <div className="ficha-left" style={{ background: used ? '#aaa' : 'var(--blue)' }}>
                  <Ico name={FICHA_ICONS[i] || 'shield'} size={20} color="rgba(255,255,255,0.9)" />
                </div>
                <div className="ficha-right" style={{ background: used ? '#ccc' : '#F2A227' }}>
                  <div className="ficha-text" style={{ color: used ? '#eee' : '#fff' }}>{f.title}</div>
                </div>
              </div>);

          })}
        </div>
      </div>
      <div className="fichas-workspace-label">Espacio de trabajo</div>
      <div ref={canvasRef} className="fichas-canvas">
        {inWorkspace.size === 0 && <div className="workspace-empty">Arrastra las fichas desde arriba<br />para construir tu ruta de respuesta</div>}
        {FICHAS_DATA.map((f, i) => {
          if (!inWorkspace.has(f.id)) return null;
          const pos = positions[f.id] || { x: 0, y: 0, z: 0 };
          return (
            <div key={f.id} className={`ficha${activeDrag === f.id ? ' dragging' : ''}`}
            style={{ left: pos.x, top: pos.y, zIndex: pos.z }}
            onMouseDown={(e) => onMouseDown(e, f.id)}>
              <div className="ficha-left"><Ico name={FICHA_ICONS[i] || 'shield'} size={24} color="rgba(255,255,255,0.9)" /></div>
              <div className="ficha-right" style={{ background: '#F2A227' }}>
                <div><div className="ficha-text">{f.title}</div>{f.subtitle && <div className="ficha-subtitle">{f.subtitle}</div>}</div>
              </div>
            </div>);

        })}
        <div className="drag-hint">Organiza las fichas libremente</div>
      </div>
    </div>);

}

function WF9({ onNext }) {
  const canvasRef = useRef(null);
  const draggingRef = useRef(null);
  const maxZ = useRef(100);
  const [circles, setCircles] = useState([]);
  const [activeDrag, setActiveDrag] = useState(null);
  const [openFicha, setOpenFicha] = useState(null);
  const circlesRef = useRef(circles);
  circlesRef.current = circles;

  const spawnCircle = useCallback((priorityId) => {
    const p = PRIORITIES.find((x) => x.id === priorityId);
    const existing = circlesRef.current.filter((c) => c.priorityId === priorityId);
    const col = existing.length;
    const id = Date.now() + Math.random();
    setCircles((prev) => [...prev, { id, priorityId, color: p.color, x: 8 + col * 48, y: 8 + PRIORITIES.findIndex((x) => x.id === priorityId) * 60, z: ++maxZ.current }]);
  }, []);

  const onMouseDown = useCallback((e, id) => {
    if (!canvasRef.current) return;
    const rect = canvasRef.current.getBoundingClientRect();
    const circ = circlesRef.current.find((c) => c.id === id);
    if (!circ) return;
    setCircles((prev) => prev.map((c) => c.id === id ? { ...c, z: ++maxZ.current } : c));
    draggingRef.current = { id, ox: e.clientX - rect.left - circ.x, oy: e.clientY - rect.top - circ.y, startX: e.clientX, startY: e.clientY, moved: false };
    setActiveDrag(id);
    e.preventDefault();e.stopPropagation();
  }, []);

  const onMouseMove = useCallback((e) => {
    if (!draggingRef.current || !canvasRef.current) return;
    const d = draggingRef.current;
    if (Math.abs(e.clientX - d.startX) > 4 || Math.abs(e.clientY - d.startY) > 4) draggingRef.current.moved = true;
    const rect = canvasRef.current.getBoundingClientRect();
    setCircles((prev) => prev.map((c) => c.id === d.id ? { ...c, x: Math.max(0, Math.min(rect.width - 40, e.clientX - rect.left - d.ox)), y: Math.max(0, Math.min(rect.height - 40, e.clientY - rect.top - d.oy)) } : c));
  }, []);

  const onMouseUp = useCallback(() => {
    const d = draggingRef.current;
    if (d && !d.moved) setCircles((prev) => prev.filter((c) => c.id !== d.id));
    draggingRef.current = null;setActiveDrag(null);
  }, []);

  useEffect(() => {
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    return () => {window.removeEventListener('mousemove', onMouseMove);window.removeEventListener('mouseup', onMouseUp);};
  }, [onMouseMove, onMouseUp]);

  return (
    <div className="screen wf9-screen fade-in" style={{ paddingTop: 56 }}>
      <div className="wf9-body">
        <div className="wf9-fichas-col">
          <div style={{ fontFamily: 'Nunito,sans-serif', fontWeight: 900, fontSize: 18, color: PINK, marginBottom: 8 }}>Líneas estratégicas</div>
          <div style={{ fontSize: 12, color: '#888', marginBottom: 16, lineHeight: 1.5 }}>Haz clic en una ficha para ver su definición. Usa los círculos de prioridad →</div>
          {ESTRATEGIAS.map((e) =>
          <div key={e.id} className="wf9-ficha" onClick={() => setOpenFicha(e)}>
              <span>{e.title}</span>
              <Ico name="info" size={16} color="rgba(255,255,255,.6)" />
            </div>
          )}
          <div style={{ marginTop: 16, display: 'flex', justifyContent: 'flex-end' }}>
            <button className="btn-pink" onClick={onNext}>Continuar <Ico name="arrow" size={16} /></button>
          </div>
        </div>
        <div className="wf9-priority-panel">
          <div className="wf9-priority-header">Marco de prioridades</div>
          <div style={{ fontSize: 11, color: '#aaa', textAlign: 'center', lineHeight: 1.5 }}>Clic en un círculo para añadirlo. Clic sobre uno añadido para eliminarlo. Arrastra para reorganizar.</div>
          <div className="wf9-source-circles">
            {PRIORITIES.map((p) =>
            <div key={p.id} className="wf9-priority-item" onClick={() => spawnCircle(p.id)}>
                <div className="wf9-priority-circle" style={{ background: p.color }}></div>
                <div className="wf9-priority-label">{p.label}</div>
                <div className="wf9-hint-label">+ añadir</div>
              </div>
            )}
          </div>
          <div ref={canvasRef} className="wf9-canvas-area">
            {circles.length === 0 && <div className="wf9-canvas-empty">Los círculos<br />aparecerán aquí</div>}
            {circles.map((c) =>
            <div key={c.id} className={`wf9-draggable-circle${activeDrag === c.id ? ' dragging' : ''}`}
            style={{ left: c.x, top: c.y, zIndex: c.z, background: c.color }}
            onMouseDown={(e) => onMouseDown(e, c.id)}
            title="Clic para eliminar · Arrastra para mover"></div>
            )}
          </div>
        </div>
      </div>
      {openFicha &&
      <div className="overlay-bg" onClick={() => setOpenFicha(null)}>
          <div className="overlay-card" onClick={(e) => e.stopPropagation()}>
            <button className="overlay-close" onClick={() => setOpenFicha(null)}>×</button>
            <div className="overlay-icon" style={{ background: 'rgba(196,52,122,.1)' }}><Ico name="shield" size={26} color={PINK} /></div>
            <h3 className="overlay-title">{openFicha.title}</h3>
            <p className="overlay-def">{openFicha.def}</p>
            <div className="overlay-actions"><button className="btn-outline-pink" onClick={() => setOpenFicha(null)}>Cerrar</button></div>
          </div>
        </div>
      }
    </div>);

}

function WF10({ onNext }) {
  const [showEjemplo, setShowEjemplo] = useState(false);
  const canvasRef = useRef(null);
  const dragging = useRef(null);
  const maxZ = useRef(50);
  const [activeDrag, setActiveDrag] = useState(null);
  const [inCanvas, setInCanvas] = useState(new Set());
  const [positions, setPositions] = useState({});
  const posRef = useRef(positions);
  posRef.current = positions;

  const dragFromShelf = useCallback((e, id) => {
    if (!canvasRef.current) return;
    const rect = canvasRef.current.getBoundingClientRect();
    const newZ = ++maxZ.current;
    const x = e.clientX - rect.left - 110,y = e.clientY - rect.top - 24;
    setPositions((prev) => ({ ...prev, [id]: { x: Math.max(0, x), y: Math.max(0, y), z: newZ } }));
    setInCanvas((prev) => new Set([...prev, id]));
    dragging.current = { id, ox: 110, oy: 24 };
    setActiveDrag(id);e.preventDefault();
  }, []);

  const onMouseDown = useCallback((e, id) => {
    const pos = posRef.current[id];
    if (!pos || !canvasRef.current) return;
    const rect = canvasRef.current.getBoundingClientRect();
    const newZ = ++maxZ.current;
    setPositions((prev) => ({ ...prev, [id]: { ...prev[id], z: newZ } }));
    dragging.current = { id, ox: e.clientX - rect.left - pos.x, oy: e.clientY - rect.top - pos.y };
    setActiveDrag(id);e.preventDefault();
  }, []);

  const onMouseMove = useCallback((e) => {
    if (!dragging.current || !canvasRef.current) return;
    const { id, ox, oy } = dragging.current;
    const rect = canvasRef.current.getBoundingClientRect();
    setPositions((prev) => ({ ...prev, [id]: { ...(prev[id] || {}), x: Math.max(0, e.clientX - rect.left - ox), y: Math.max(0, e.clientY - rect.top - oy) } }));
  }, []);

  const onMouseUp = useCallback(() => {dragging.current = null;setActiveDrag(null);}, []);

  useEffect(() => {
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    return () => {window.removeEventListener('mousemove', onMouseMove);window.removeEventListener('mouseup', onMouseUp);};
  }, [onMouseMove, onMouseUp]);

  return (
    <div className="screen wf10-screen fade-in">
      <div className="wf10-top-panel">
        <div>
          <h2>Líneas Estratégicas — Organización libre</h2>
          <div style={{ fontSize: 12, color: 'rgba(255,255,255,.5)', marginTop: 3 }}>Paso 3b · Plan de Seguridad · Bolsillo Rosado</div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <button className="btn-pink" onClick={onNext}>Continuar <Ico name="arrow" size={16} /></button>
        </div>
      </div>
      <div className="wf10-fichas-shelf">
        <div className="wf10-shelf-label">Arrastra una ficha al espacio de trabajo ↓</div>
        <div className="wf10-shelf-grid">
          {ESTRATEGIAS.map((e) =>
          <div key={e.id} className={`wf10-shelf-chip${inCanvas.has(e.id) ? ' used' : ''}`}
          onMouseDown={(ev) => !inCanvas.has(e.id) && dragFromShelf(ev, e.id)}>{e.title}</div>
          )}
        </div>
      </div>
      <div className="wf10-workspace-label">Espacio de organización libre</div>
      <div ref={canvasRef} className="wf10-canvas">
        {inCanvas.size === 0 && <div className="wf10-canvas-empty">Arrastra fichas desde la parte superior<br />y organízalas a tu manera</div>}
        {ESTRATEGIAS.filter((e) => inCanvas.has(e.id)).map((e) => {
          const pos = positions[e.id] || { x: 20, y: 20, z: 1 };
          return (
            <div key={e.id} className={`wf10-draggable${activeDrag === e.id ? ' dragging' : ''}`}
            style={{ left: pos.x, top: pos.y, zIndex: pos.z }}
            onMouseDown={(ev) => onMouseDown(ev, e.id)}>{e.title}</div>);

        })}
      </div>
      {showEjemplo && <Ejemplo1Overlay onClose={() => setShowEjemplo(false)} />}
    </div>);

}

/* ══════════════════════════════════════
   NAV
══════════════════════════════════════ */
const NAV_AMARILLO = [{ id: 'home-a', label: 'Inicio' }, { id: 'estrategias-a', label: 'Estrategias' }, { id: 'concepts-a', label: 'Conceptos' }, { id: 'casos-a', label: 'Casos' }, { id: 'fichas-a', label: 'Fichas' }, { id: 'matrix-a', label: 'Matriz' }];
const NAV_ROSADO = [{ id: 'wf5', label: 'Conceptos' }, { id: 'wf6', label: 'Estructura' }, { id: 'wf7', label: '1.Sujeto' }, { id: 'wf8', label: '2.Hipótesis' }, { id: 'wf9', label: '3.Estrategias' }, { id: 'wf10', label: '3b.Fichas' }, { id: 'wf11', label: '4.Objetivo' }, { id: 'wf12', label: '5.Alcances' }, { id: 'wf13', label: '6.Operativo' }];

function Nav({ screen, setScreen, bolsillo }) {
  const steps = bolsillo === 'amarillo' ? NAV_AMARILLO : bolsillo === 'rosado' ? NAV_ROSADO : [];
  const cur = steps.findIndex((s) => s.id === screen);
  const activeClass = bolsillo === 'amarillo' ? 'active-y' : 'active-p';
  return (
    <nav className="nav">
      <div className="nav-logo" onClick={() => setScreen('home')}>
        <img src={window.__resources && window.__resources.logoProtegidos || 'uploads/logo de protegidos .png'} alt="Protejid@s" style={{ height: 30, display: 'block' }} />
      </div>
      <div className="nav-steps">
        {steps.map((s, i) =>
        <button key={s.id}
        className={`nav-step ${s.id === screen ? activeClass : i < cur ? 'done' : ''}`}
        onClick={i < cur ? () => setScreen(s.id) : undefined}>{s.label}</button>
        )}
      </div>
      {bolsillo &&
      <button className="nav-back" onClick={() => setScreen('home')} style={{ color: "rgb(255, 255, 255)" }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" /></svg>
          Caja de herramientas
        </button>
      }
    </nav>);

}

/* ══════════════════════════════════════
   APP
══════════════════════════════════════ */
const ROSADO_ORDER = ['wf5', 'wf6', 'wf7', 'wf8', 'wf9', 'wf10', 'wf11', 'wf12', 'wf13'];
const AMARILLO_ORDER = ['home-a', 'estrategias-a', 'concepts-a', 'casos-a', 'fichas-a', 'matrix-a'];

function App() {
  const [screen, setScreen] = useState('home');

  const bolsillo = screen.endsWith('-a') || screen === 'home-a' ? 'amarillo' :
  screen.startsWith('wf') ? 'rosado' : null;

  const goNext = () => {
    if (bolsillo === 'amarillo') {
      const i = AMARILLO_ORDER.indexOf(screen);
      if (i < AMARILLO_ORDER.length - 1) setScreen(AMARILLO_ORDER[i + 1]);
    } else if (bolsillo === 'rosado') {
      const i = ROSADO_ORDER.indexOf(screen);
      if (i < ROSADO_ORDER.length - 1) setScreen(ROSADO_ORDER[i + 1]);
    }
  };

  return (
    <div>
      <Nav screen={screen} setScreen={setScreen} bolsillo={bolsillo} />
      {screen === 'home' && <HomeScreen onAmarillo={() => setScreen('home-a')} onRosado={() => setScreen('wf5')} />}
      {screen === 'home-a' && <HomeScreen onAmarillo={() => setScreen('estrategias-a')} onRosado={() => setScreen('wf5')} />}
      {screen === 'estrategias-a' && <EstrategiasScreen onNext={goNext} />}
      {screen === 'concepts-a' && <ConceptsScreenA onNext={goNext} />}
      {screen === 'casos-a' && <CasosScreen onNext={goNext} />}
      {screen === 'fichas-a' && <FichasScreenA onNext={goNext} />}
      {screen === 'matrix-a' && <MatrixScreenA />}
      {screen === 'wf5' && <WF5 onNext={goNext} />}
      {screen === 'wf6' && <WF6 onNext={goNext} />}
      {screen === 'wf7' && <WF7 onNext={goNext} />}
      {screen === 'wf8' && <WF8 onNext={goNext} />}
      {screen === 'wf9' && <WF9 onNext={goNext} />}
      {screen === 'wf10' && <WF10 onNext={goNext} />}
      {screen === 'wf11' && <WF11 onNext={goNext} />}
      {screen === 'wf12' && <WF12 onNext={goNext} />}
      {screen === 'wf13' && <WF13 />}
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
